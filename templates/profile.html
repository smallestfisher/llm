{% extends "base.html" %}

{% block title %}修改密码 | BOE Data Copilot{% endblock %}
{% block page_title %}修改密码{% endblock %}
{% block page_subtitle %}更新当前账号密码{% endblock %}

{% block content %}
<section class="modal-shell">
  <section class="panel modal-card">
    <div class="modal-head">
      <div class="section-head section-head-tight">
        <div class="eyebrow">Security</div>
        <h2>修改密码</h2>
        <p>更新当前账号的登录密码。</p>
      </div>
      <a class="nav-link nav-icon-link" href="/" title="关闭" aria-label="关闭">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6 6l12 12"/>
          <path d="M18 6L6 18"/>
        </svg>
        <span class="sr-only">关闭</span>
      </a>
    </div>
    <form class="form-grid" action="/profile/password" method="post">
      <label class="field">
        <span class="field-label">当前密码</span>
        <input type="password" name="current_password" autocomplete="current-password" required>
      </label>
      <label class="field">
        <span class="field-label">新密码</span>
        <input type="password" name="new_password" autocomplete="new-password" minlength="8" required>
      </label>
      <button class="button button-primary button-block" type="submit">保存新密码</button>
    </form>
  </section>
</section>
{% endblock %}
