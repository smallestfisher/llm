{% extends "base.html" %}

{% block title %}注册 | BOE Data Copilot{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="panel auth-card">
    <div class="auth-header">
      <div class="brand brand-inline">
        <div class="brand-mark">BD</div>
        <div>
          <div class="brand-name">BOE Data Copilot</div>
          <div class="brand-subtitle">AI Workspace</div>
        </div>
      </div>
      <div class="eyebrow">Create Account</div>
      <h1 class="auth-title">创建账号</h1>
      {% if is_first_user %}
      <p class="auth-subtitle">首个注册成功的用户会自动获得管理员权限。</p>
      <div class="auth-note">注册完成后将直接进入系统，并可以继续创建其他账号。</div>
      {% else %}
      <p class="auth-subtitle">创建本地账号并立即进入系统。</p>
      {% endif %}
    </div>

    <form class="auth-form" action="/register" method="post">
      <label class="field">
        <span class="field-label">用户名</span>
        <input type="text" name="username" autocomplete="username" required>
      </label>
      <label class="field">
        <span class="field-label">密码</span>
        <input type="password" name="password" autocomplete="new-password" minlength="8" required>
      </label>
      <label class="field">
        <span class="field-label">确认密码</span>
        <input type="password" name="confirm_password" autocomplete="new-password" minlength="8" required>
      </label>
      <button class="button button-primary button-block" type="submit">注册并登录</button>
    </form>

    <div class="auth-switch">
      <span>已经有账号了？</span>
      <a href="/login">返回登录</a>
    </div>
  </div>
</section>
{% endblock %}
